<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#14223E"/>
  <!-- Five Anchors, Four Open: 3x3 grid, + filled, corners open -->
  <!-- top row -->
  <rect x="4"  y="4"  width="6" height="6" fill="none"   stroke="#FBF8EF" stroke-width="1.4"/>
  <rect x="13" y="4"  width="6" height="6" fill="#FBF8EF"/>
  <rect x="22" y="4"  width="6" height="6" fill="none"   stroke="#FBF8EF" stroke-width="1.4"/>
  <!-- middle row -->
  <rect x="4"  y="13" width="6" height="6" fill="#FBF8EF"/>
  <rect x="13" y="13" width="6" height="6" fill="#FBF8EF"/>
  <rect x="22" y="13" width="6" height="6" fill="#FBF8EF"/>
  <!-- bottom row -->
  <rect x="4"  y="22" width="6" height="6" fill="none"   stroke="#FBF8EF" stroke-width="1.4"/>
  <rect x="13" y="22" width="6" height="6" fill="#FBF8EF"/>
  <rect x="22" y="22" width="6" height="6" fill="none"   stroke="#FBF8EF" stroke-width="1.4"/>
</svg>

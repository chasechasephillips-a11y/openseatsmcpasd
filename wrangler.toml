name = "openseatsmcpasd"
compatibility_date = "2026-05-01"
pages_build_output_dir = "."

# D1 database binding. After running `wrangler d1 create openseats`,
# paste the database_id it prints below. The binding name DB is what
# the functions in /functions/api/ read as context.env.DB.
[[d1_databases]]
binding = "DB"
database_name = "openseats"
database_id = "ba9ac70a-3f9a-45ee-b780-3eaa51f6b11f"

# EXPORT_TOKEN is set as a Pages secret, not a plaintext var.
# Rotate with: echo "<new-token>" | wrangler pages secret put EXPORT_TOKEN --project-name=openseatsmcpasd

# Paper-signature count shown on the public counter. This is the count of
# physical signatures CHASE HAS RECEIVED IN HIS MAILBOX so far — separate
# from online interest signups in the D1 'signatures' table.
# To update: change this number, then run:
#   wrangler pages deploy . --project-name=openseatsmcpasd --branch=main
[vars]
PAPER_SIGNATURES = "55"

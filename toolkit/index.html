<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Open Seats MCPASD — campaign toolkit. Printable business cards, a half-sheet flyer, and copy-paste social media posts so anyone can help spread the word.">
<title>Toolkit — Open Seats MCPASD</title>
<meta name="theme-color" content="#F5EFE0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBF8EF; --paper-warm: #FCF8E8; --paper-card: #FFFBF1;
    --ink: #14223E; --ink-soft: #2A3756; --ink-muted: #6E4F2F;
    --rule: #D5C8A9; --rule-deep: #A89572; --line-soft: #E9DDC0;
    --red: #B98521; --red-dark: #8C6112; --red-bright: #D29D2E;
    --green: #6B7A4F; --green-soft: #E2E6D4;
    --display: 'Old Standard TT', 'Hoefler Text', 'Times New Roman', serif;
    --body: 'Lora', Georgia, 'Times New Roman', serif;
    --italic: 'IM Fell DW Pica', 'Lora', Georgia, serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--body);
    color: var(--ink); line-height: 1.6;
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.08 0 0 0 0 0.06 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  a { color: var(--red-dark); }
  .container { max-width: 1080px; margin: 0 auto; padding: 56px 28px; }
  .topbar {
    border-bottom: 1px solid var(--rule-deep);
    padding: 16px 28px;
    background: var(--paper);
  }
  .topbar a {
    font-family: var(--body); font-weight: 600;
    font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; text-decoration: none;
    color: var(--ink-soft);
  }
  .topbar a:hover { color: var(--red-dark); }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 14px;
    color: var(--red-dark);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.34em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; height: 1.5px; width: 32px; background: var(--red);
    display: inline-block;
  }
  h1 {
    font-family: var(--display);
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 700; line-height: 1.02;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }
  h1 em {
    font-family: var(--italic);
    color: var(--red); font-style: italic;
  }
  p.lead {
    font-size: 18px; color: var(--ink-soft);
    max-width: 640px; line-height: 1.55;
    margin-bottom: 40px;
  }
  .kit-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 22px;
    margin-top: 32px;
  }
  @media (max-width: 600px) { .kit-grid { grid-template-columns: 1fr; } }
  .kit-card {
    background: var(--paper-card);
    border: 1px solid var(--rule);
    border-top: 5px solid var(--red);
    padding: 30px 26px 26px;
    box-shadow: 5px 5px 0 var(--rule-deep);
    text-decoration: none; color: var(--ink);
    display: flex; flex-direction: column; gap: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .kit-card:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--rule-deep); }
  .kit-card .num {
    font-family: var(--display); font-weight: 700;
    font-size: 36px; color: var(--red); line-height: 1;
  }
  .kit-card h2 {
    font-family: var(--display); font-size: 22px;
    line-height: 1.2; color: var(--ink); margin: 0;
  }
  .kit-card p { font-size: 14.5px; color: var(--ink-soft); margin: 0; line-height: 1.55; }
  .kit-card .cta {
    margin-top: auto;
    font-family: var(--body); font-weight: 700;
    font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red-dark); display: inline-flex; align-items: center; gap: 6px;
  }
  .kit-card .cta::after { content: "→"; font-size: 14px; transition: transform 0.15s; }
  .kit-card:hover .cta::after { transform: translateX(3px); }
  .tip {
    margin-top: 24px; padding: 18px 22px;
    background: var(--paper-card);
    border-left: 4px solid var(--green);
    box-shadow: 3px 3px 0 var(--rule);
    font-size: 14px; color: var(--ink-soft);
    line-height: 1.55;
  }
  .tip strong { color: var(--ink); font-weight: 700; }
  .tip code {
    font-family: 'Courier New', monospace;
    background: var(--paper-warm);
    padding: 2px 6px; border: 1px solid var(--rule);
    font-size: 13px;
  }

  /* ─── Hero ornament ─────────────────────────────────────── */
  .ornament {
    display: flex; align-items: center; gap: 18px;
    margin: 14px 0 30px;
    color: var(--rule-deep);
  }
  .ornament .line { flex: 1; height: 1.5px; background: var(--rule-deep); }
  .ornament .mark {
    font-family: var(--display); font-size: 22px;
    color: var(--red);
    line-height: 1;
  }

  /* ─── Live stats band ──────────────────────────────────── */
  .stats-band {
    background: var(--ink);
    color: var(--paper);
    border-top: 4px solid var(--red);
    border-bottom: 4px solid var(--red);
    padding: 28px 32px;
    margin: 0 0 56px;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 28px;
    align-items: center;
    position: relative;
  }
  .stats-band::before {
    content: "❖  WHERE WE ARE  ❖";
    position: absolute;
    top: -11px; left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    color: var(--red-dark);
    padding: 0 14px;
    font-family: var(--body); font-size: 9.5px;
    font-weight: 700; letter-spacing: 0.36em;
  }
  @media (max-width: 720px) { .stats-band { grid-template-columns: 1fr; gap: 20px; padding: 24px 22px; } }
  .stat-block .n {
    font-family: var(--display);
    font-weight: 700; font-size: 44px;
    color: var(--red-bright);
    line-height: 1;
    letter-spacing: -0.02em;
    display: flex; align-items: baseline; gap: 6px;
  }
  .stat-block .n .of {
    font-family: var(--body); font-size: 16px;
    color: rgba(245,239,224,0.6);
    font-weight: 500; letter-spacing: 0;
  }
  .stat-block .lbl {
    font-family: var(--body); font-size: 10px;
    font-weight: 700; letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.75);
    margin-top: 8px;
  }
  .stat-block .bar {
    height: 6px; width: 100%;
    background: rgba(245,239,224,0.16);
    margin-top: 10px;
    position: relative;
  }
  .stat-block .bar .fill {
    height: 100%; width: 0%;
    background: var(--red-bright);
    transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .stat-block .bar .legal {
    position: absolute; top: -3px; bottom: -3px;
    width: 1.5px; background: rgba(245,239,224,0.5);
    left: 90.9%;
  }
  .stat-block .bar .legal::after {
    content: "500 legal";
    position: absolute; top: 100%; right: -4px;
    font-family: var(--body); font-size: 9px;
    font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.55);
    margin-top: 6px; white-space: nowrap;
  }

  /* ─── Section dividers ─────────────────────────────────── */
  .section-head {
    margin: 64px 0 22px;
    display: flex; align-items: baseline; gap: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--ink);
  }
  .section-head .sec-num {
    font-family: var(--display); font-weight: 700;
    font-size: 38px; color: var(--red);
    line-height: 1; letter-spacing: -0.02em;
  }
  .section-head .sec-titles {
    flex: 1;
  }
  .section-head h2 {
    font-family: var(--display); font-weight: 700;
    font-size: 26px; color: var(--ink);
    letter-spacing: -0.012em; line-height: 1.1;
    margin-bottom: 4px;
  }
  .section-head h2 em { font-family: var(--italic); color: var(--red); font-style: italic; }
  .section-head .sec-sub {
    font-family: var(--italic); font-style: italic;
    font-size: 14.5px; color: var(--ink-muted);
    line-height: 1.5;
  }

  /* Per-section card border colors */
  .kit-grid.print .kit-card { border-top-color: var(--red); }
  .kit-grid.talk  .kit-card { border-top-color: var(--green); }
  .kit-grid.send  .kit-card { border-top-color: var(--ink); }
  .kit-grid.talk  .kit-card .num { color: var(--green); }
  .kit-grid.send  .kit-card .num { color: var(--ink-soft); }
  .kit-grid.talk  .kit-card .cta { color: var(--green); }
  .kit-grid.send  .kit-card .cta { color: var(--ink-soft); }

  /* ─── Closing inspirational block ─────────────────────── */
  .close-block {
    margin: 72px 0 8px;
    padding: 44px 40px;
    background: var(--paper-warm);
    border-top: 4px double var(--rule-deep);
    border-bottom: 4px double var(--rule-deep);
    text-align: center;
    position: relative;
  }
  .close-block::before {
    content: "§";
    position: absolute;
    top: -22px; left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    color: var(--red);
    padding: 0 14px;
    font-family: var(--display); font-weight: 700;
    font-size: 28px; line-height: 1;
  }
  .close-block .close-quote {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(20px, 2.6vw, 28px);
    line-height: 1.35;
    color: var(--ink);
    max-width: 720px; margin: 0 auto 18px;
    letter-spacing: -0.005em;
  }
  .close-block .close-quote em {
    font-family: var(--italic);
    color: var(--red); font-style: italic;
  }
  .close-block .close-sig {
    font-family: var(--body); font-size: 10.5px;
    font-weight: 700; letter-spacing: 0.36em;
    text-transform: uppercase;
    color: var(--red-dark);
    margin-top: 18px;
  }

  /* ─── New logo: Five Anchors, Four Open ─────────────────────── */
  .mark, .topbar .brand .mark, .footer-brand .mark {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"> <rect width="32" height="32" fill="none"/> <rect x="4" y="4" width="6" height="6" fill="none" stroke="%23FBF8EF" stroke-width="1.4"/> <rect x="13" y="4" width="6" height="6" fill="%23FBF8EF"/> <rect x="22" y="4" width="6" height="6" fill="none" stroke="%23FBF8EF" stroke-width="1.4"/> <rect x="4" y="13" width="6" height="6" fill="%23FBF8EF"/> <rect x="13" y="13" width="6" height="6" fill="%23FBF8EF"/> <rect x="22" y="13" width="6" height="6" fill="%23FBF8EF"/> <rect x="4" y="22" width="6" height="6" fill="none" stroke="%23FBF8EF" stroke-width="1.4"/> <rect x="13" y="22" width="6" height="6" fill="%23FBF8EF"/> <rect x="22" y="22" width="6" height="6" fill="none" stroke="%23FBF8EF" stroke-width="1.4"/> </svg>") !important;
    background-position: center !important;
    background-size: 78% 78% !important;
    background-repeat: no-repeat !important;
    color: transparent !important;
    text-indent: -9999px;
    overflow: hidden;
    font-size: 0 !important;
  }
</style>
<script src="/assets/beacon.js" defer></script>
</div>

</body>
</html>
